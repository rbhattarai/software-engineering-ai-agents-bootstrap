# .harness/profile.yaml — COMMITTED. Non-secret project profile (A5 #3).
# Secrets (tokens, credentialed URLs) belong in .env.harness (gitignored) — never here.
# Generated by /harness-init; refreshed by /harness-scan and /harness-sync.

project:
  name: ""
  type: existing            # new | existing
  topology: single          # single | mono-repo | multi-repo (see workspace.yaml for non-single)

methodology: openspec       # bmad | spec-kit | openspec

stack:                      # detected by /harness-scan or chosen at init
  languages: []             # e.g. [typescript, java]
  frameworks: []            # e.g. [react, spring-boot]
  databases: []             # e.g. [postgres, redis]
  messaging: []             # e.g. [kafka]

devops:
  ci: ""                    # e.g. github-actions
  containers: docker-compose
cloud: ""                   # aws | azure | gcp | vercel — drives the deploy plugin choice

org:                        # organization context (A1 intake; compose-first, A5 #7)
  internal_libraries: []    # - { name: "@acme/ui", registry: "npm:@acme", purpose: "design-system components" }
  preferred_libraries: []   # - { use: "dayjs", never: "moment", reason: "org standard" }
  conventions_url: ""       # Confluence/SharePoint page holding org guidelines (wiki-ingest pulls it)
  conventions: []           # inline rules, e.g. "errors: never swallow; wrap in AppError"

sources:                    # enterprise memory sources (tier-3 wiki ingestion)
  jira_project: ""
  confluence_spaces: []
  sharepoint_sites: []
  deferred:                 # NOT ingested in v1 (A5 #6) — needs transcription/OCR infra
    - video_recordings
    - nas_documents
